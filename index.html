<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>MUGEN-ABURA (improved)</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;background:#000;overflow:hidden;touch-action:none}
canvas{display:block}
#ui{position:fixed;left:8px;top:8px;color:#fff;font-family:sans-serif;pointer-events:none}
#slotBtn{position:fixed;right:12px;bottom:12px;padding:10px 16px;background:#FFDD57;border-radius:8px;font-weight:bold}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
<div id="score">SCORE: 0</div>
<div id="life">LIFE: 3</div>
<div id="stage">STAGE: 1</div>
</div>
<button id="slotBtn">SLOT</button>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const lifeEl = document.getElementById('life');
const stageEl = document.getElementById('stage');
const slotBtn = document.getElementById('slotBtn');

let W, H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; player.x=W/2; player.y=H-120; }
addEventListener('resize', resize);
resize();

// assets (replace with real images if available)
const bgImg = new Image(); bgImg.src = 'bg_okinawa.jpg'; // turquoise sea & sky

// game state
let bullets = [], enemies = [], particles = [], pickups = [];
let score = 0, life = 3, stage = 1, gear = 0;
let isTouching=false, touchId=null;
const maxParticles = 60;

// player
let player = { x: W/2, y: H-120, tx: W/2, ty: H-120, radius:22 };

// helper: oil draw
function drawOilCircle(x,y,r){
const g = ctx.createRadialGradient(x-4,y-4,2,x,y,r);
g.addColorStop(0,'#fff'); g.addColorStop(0.25,'#FFE55C'); g.addColorStop(0.6,'#FFD700'); g.addColorStop(1,'#8B6914');
ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}

// player
function drawPlayer(){
// smooth follow
player.x += (player.tx - player.x) * 0.18;
player.y += (player.ty - player.y) * 0.18;
drawOilCircle(player.x, player.y, player.radius);
ctx.fillStyle='rgba(255,255,255,0.6)';
ctx.beginPath(); ctx.arc(player.x-5,player.y-5,6,0,Math.PI*2); ctx.fill();
}

// shooting
function shoot(){
for (let i=bullets.length-1;i>=0;i--){
const b = bullets[i];
shoot();
});
canvas.addEventListener('touchmove', e=>{
e.preventDefault();
for (let t of e.changedTouches){
if (t.identifier === touchId){
const pos = toCanvasPos(t.clientX, t.clientY);
player.tx = pos.x; player.ty = Math.max(H-300, Math.min(pos.y, H-50));
}
}
});
canvas.addEventListener('touchend', e=>{
for (let t of e.changedTouches) if (t.identifier === touchId) { isTouching=false; touchId=null; }
});

// mouse fallback
let mouseDown=false;
canvas.addEventListener('mousedown', e=>{
mouseDown=true;
const p = toCanvasPos(e.clientX,e.clientY);
player.tx = p.x; player.ty = Math.max(H-300, Math.min(p.y, H-50));
shoot();
});
canvas.addEventListener('mousemove', e=>{
if (mouseDown){
const p = toCanvasPos(e.clientX,e.clientY);
player.tx = p.x; player.ty = Math.max(H-300, Math.min(p.y, H-50));
}
});
canvas.addEventListener('mouseup', ()=>{ mouseDown=false; });

// auto-fire while touching/mouse held
setInterval(()=>{ if (isTouching || mouseDown) shoot(); }, 160);

// initial UI update and start
updateUI();
update();
</script>
</body>
</html>
